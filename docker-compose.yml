version: '3.8'

services:
  # Servicio de RethinkDB
  rethinkdb:
    image: rethinkdb:latest
    container_name: rethinkdb
    ports:
      - "28015:28015"  # Puerto del driver
      - "8080:8080"    # Puerto del admin web
    volumes:
      - rethinkdb_data:/data
    environment:
      - RETHINKDB_DB=rethinkchat
    command: rethinkdb --bind all --http-port 8080
    restart: unless-stopped

  # Servicio de la aplicación Node.js
  app:
    build: .
    container_name: rethink-chat-app
    ports:
      - "3000:3000"
    depends_on:
      - rethinkdb
    environment:
      - RETHINK_HOST=rethinkdb
      - RETHINK_PORT=28015
      - RETHINK_DB=rethinkchat
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  rethinkdb_data: