version: '3.8'

services:
  rethinkdb:
    image: rethinkdb:latest
    container_name: rethinkdb
    ports:
      - "28015:28015"
      - "8080:8080"
    volumes:
      - rethinkdb_data:/data/rethinkdb
    command: rethinkdb --bind all --http-port 8080
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "3000:3000"
    depends_on:
      - rethinkdb
    environment:
      - RETHINK_HOST=rethinkdb
      - RETHINK_PORT=28015
      - RETHINK_DB=rethinkchat
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  rethinkdb_data: